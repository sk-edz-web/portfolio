<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Portfolio | Creative Work</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #f8faff 0%, #eff3fc 100%);
      color: #1a1e2b;
      line-height: 1.5;
      padding: 1.5rem 1rem;
    }

    .portfolio-container {
      max-width: 1280px;
      margin: 0 auto;
    }

    /* Profile section - no editing controls */
    .profile-section {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(8px);
      border-radius: 2rem;
      padding: 1.5rem;
      margin-bottom: 2.5rem;
      box-shadow: 0 12px 28px -8px rgba(0, 0, 0, 0.08);
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      border: 1px solid rgba(255,255,255,0.6);
    }

    .profile-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 8px 20px -6px rgba(0, 0, 0, 0.15);
      border: 3px solid white;
      background: #eef2ff;
      flex-shrink: 0;
    }

    .profile-info {
      flex: 1;
      min-width: 180px;
    }

    .profile-name {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      background: linear-gradient(135deg, #1f2b48, #2a3a6e);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.25rem;
      word-break: break-word;
    }

    .profile-bio {
      font-size: 0.95rem;
      color: #2c3e66;
      max-width: 550px;
    }

    /* Section header */
    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .section-header h2 {
      font-weight: 700;
      font-size: 1.7rem;
      background: linear-gradient(120deg, #1e2b48, #1f3a5f);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .card-count-badge {
      background: #e9edf5;
      padding: 0.3rem 1rem;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #2c3e66;
    }

    /* Cards grid: 2 columns on desktop, 1 on mobile */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    /* Card styling */
    .card-item {
      background: #ffffff;
      border-radius: 1.5rem;
      overflow: hidden;
      box-shadow: 0 10px 25px -8px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(255,255,255,0.4);
    }
    .card-item:active {
      transform: scale(0.98);
    }

    .card-img {
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      background: #d9e2f0;
      transition: transform 0.3s;
    }
    .card-item:hover .card-img {
      transform: scale(1.02);
    }

    .card-content {
      padding: 1.2rem 1.2rem 1.3rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 0.4rem;
      line-height: 1.3;
    }

    .card-description {
  color: #475569;
  font-size: 0.85rem;
  margin-bottom: 1rem;
  
  /* Hard limit fallback */
  line-height: 1.5em; 
  height: 3em; /* Exactly 2 lines (1.5 * 2) */
  overflow: hidden;
  display: block; 
}
    .card-open-btn {
      background: #1f2f4e;
      border: none;
      color: white;
      font-weight: 600;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: fit-content;
      font-family: inherit;
      transition: 0.2s;
      margin-top: auto;
    }
    .card-open-btn:active {
      transform: scale(0.96);
      background: #0f1f38;
    }

    /* Modal - optimized for mobile */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: visibility 0.2s, opacity 0.2s;
      padding: 1rem;
    }
    .modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }

    .modal-card {
      background: white;
      width: 100%;
      max-width: 650px;
      border-radius: 1.8rem;
      overflow-y: auto;
      max-height: 90vh;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
      animation: modalPop 0.25s ease;
    }
    @keyframes modalPop {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .modal-img {
      width: 100%;
      max-height: 320px;
      object-fit: cover;
      background: #e2e8f0;
      border-top-left-radius: 1.8rem;
      border-top-right-radius: 1.8rem;
    }
    .modal-details {
      padding: 1.5rem;
    }
    .modal-title {
      font-size: 1.7rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #0f172a;
      word-break: break-word;
    }
    .modal-description {
      font-size: 0.95rem;
      color: #334155;
      line-height: 1.5;
      margin-bottom: 1.8rem;
      white-space: pre-wrap;
    }
    .modal-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
    }
    .modal-open-btn, .modal-close-btn {
      border: none;
      font-weight: 600;
      padding: 0.7rem 1.5rem;
      border-radius: 3rem;
      font-size: 0.9rem;
      cursor: pointer;
      font-family: inherit;
      transition: 0.2s;
      flex: 1 0 auto;
    }
    .modal-open-btn {
      background: #1f2f4e;
      color: white;
    }
    .modal-open-btn:active {
      background: #0f1f38;
    }
    .modal-close-btn {
      background: #eef2ff;
      color: #1f2f4e;
    }
    .modal-close-btn:active {
      background: #e2e8f0;
    }

    /* Loader & empty states */
    .loader {
      display: flex;
      justify-content: center;
      padding: 2rem;
      grid-column: span 2;
    }
    .spinner {
      width: 42px;
      height: 42px;
      border: 4px solid #e2e8f0;
      border-top-color: #1f3a5f;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .empty-state {
      text-align: center;
      grid-column: span 2;
      background: #f1f5f9;
      padding: 2rem;
      border-radius: 1.5rem;
      color: #334155;
      font-weight: 500;
      font-size: 0.9rem;
    }

    footer {
      text-align: center;
      margin-top: 2.5rem;
      font-size: 0.75rem;
      color: #6c7a91;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(0,0,0,0.05);
    }

    /* Mobile optimizations */
    @media (max-width: 680px) {
      body {
        padding: 1rem;
      }
      .profile-section {
        flex-direction: column;
        text-align: center;
        padding: 1.2rem;
        gap: 1rem;
      }
      .profile-avatar {
        width: 90px;
        height: 90px;
      }
      .profile-name {
        font-size: 1.5rem;
      }
      .profile-bio {
        font-size: 0.85rem;
      }
      .cards-grid {
        grid-template-columns: 1fr;
        gap: 1.2rem;
      }
      .card-title {
        font-size: 1.2rem;
      }
      .modal-title {
        font-size: 1.4rem;
      }
      .modal-details {
        padding: 1.2rem;
      }
      .modal-open-btn, .modal-close-btn {
        padding: 0.6rem 1rem;
        font-size: 0.85rem;
      }
      .section-header h2 {
        font-size: 1.4rem;
      }
    }

    /* Touch-friendly adjustments */
    @media (hover: none) and (pointer: coarse) {
      .card-item {
        cursor: default;
      }
      .card-open-btn, .modal-open-btn, .modal-close-btn {
        cursor: default;
        -webkit-tap-highlight-color: transparent;
      }
    }
  </style>
</head>
<body>
<div class="portfolio-container">
  <!-- Profile section - display only, no edit controls -->
  <div class="profile-section">
    <div class="profile-info">
        <img class="profile-avatar" id="profileAvatar" alt="Profile" src="https://getshared.com/dashboard/api/files/f6e8ea57-25e5-11f1-8264-ac1f6b763f30/stream?token=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJzdWIiOjMyNjM0LCJlbWFpbCI6InBvZGEudmVuYS52ZW5nYXlhbUBnbWFpbC5jb20iLCJpYXQiOjE3NzQxNzY2NzQsImV4cCI6MTc3Njc2ODY3NH0.K09ogGL9qiVGYEWsTLK-3yiWbtxLeow1kLnffO9TZJI&t=1774180513746">
      <div class="profile-name" id="profileName">Loading profile...</div>
      <div class="profile-bio" id="profileBio">Connecting to database</div>
    </div>
  </div>

  <div class="section-header">
    <h2>📁 Projects</h2>
    <span class="card-count-badge" id="cardCountBadge">0 cards</span>
  </div>
  <div class="cards-grid" id="cardsGrid">
    <div class="loader"><div class="spinner"></div></div>
  </div>
  <footer>Click any card to view full details</footer>
</div>

<!-- Modal -->
<div id="cardModal" class="modal-overlay">
  <div class="modal-card">
    <img id="modalImage" class="modal-img" alt="full preview">
    <div class="modal-details">
      <h3 id="modalTitle" class="modal-title"></h3>
      <p id="modalDescription" class="modal-description"></p>
      <div class="modal-actions">
        <button id="modalOpenBtn" class="modal-open-btn">🔗 Open</button>
        <button id="modalCloseBtn" class="modal-close-btn">✖ Close</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.2/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.2/firebase-firestore.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.2/firebase-analytics.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA1rIPi-HJmBMSfkuP87DGIZPsDPHqf7A4",
    authDomain: "skedz-f5826.firebaseapp.com",
    databaseURL: "https://skedz-f5826-default-rtdb.firebaseio.com",
    projectId: "skedz-f5826",
    storageBucket: "skedz-f5826.firebasestorage.app",
    messagingSenderId: "62715657946",
    appId: "1:62715657946:web:96f1fa87e1584023226fe3",
    measurementId: "G-MZJ1SWEHD6"
  };

  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const db = getFirestore(app);

  // DOM elements
  const profileAvatar = document.getElementById('profileAvatar');
  const profileName = document.getElementById('profileName');
  const profileBio = document.getElementById('profileBio');
  const cardsGrid = document.getElementById('cardsGrid');
  const cardCountBadge = document.getElementById('cardCountBadge');
  const modalOverlay = document.getElementById('cardModal');
  const modalImage = document.getElementById('modalImage');
  const modalTitle = document.getElementById('modalTitle');
  const modalDescription = document.getElementById('modalDescription');
  const modalOpenBtn = document.getElementById('modalOpenBtn');
  const modalCloseBtn = document.getElementById('modalCloseBtn');

  let currentLink = "";

  function closeModal() {
    modalOverlay.classList.remove('active');
    document.body.style.overflow = '';
  }

  function openModal(card) {
    modalImage.src = card.imageUrl || 'https://placehold.co/800x500/eef2ff/2c3e66?text=Preview';
    modalImage.alt = card.title;
    modalTitle.textContent = card.title || 'Untitled';
    modalDescription.textContent = card.description || 'No additional details.';
    currentLink = card.linkUrl || '#';
    modalOpenBtn.onclick = (e) => {
      e.stopPropagation();
      if (currentLink && currentLink !== '#') {
        window.open(currentLink, '_blank', 'noopener,noreferrer');
      } else {
        alert('No external link or file attached.');
      }
    };
    modalOverlay.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  modalOverlay.addEventListener('click', (e) => {
    if (e.target === modalOverlay) closeModal();
  });
  modalCloseBtn.addEventListener('click', closeModal);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && modalOverlay.classList.contains('active')) closeModal();
  });

  // Fetch profile from Firestore (read-only)
  async function fetchProfile() {
    try {
      const profileCol = collection(db, "profile");
      const snapshot = await getDocs(profileCol);
      let profileData = null;
      if (!snapshot.empty) {
        profileData = snapshot.docs[0].data();
      } else {
        const profileDocRef = doc(db, "profile", "profile");
        const docSnap = await getDoc(profileDocRef);
        if (docSnap.exists()) profileData = docSnap.data();
      }
      if (profileData) {
        if (profileData.avatarUrl) profileAvatar.src = profileData.avatarUrl;
        if (profileData.name) profileName.textContent = profileData.name;
        else if (profileData.fullName) profileName.textContent = profileData.fullName;
        else profileName.textContent = "Portfolio";
        if (profileData.bio) profileBio.textContent = profileData.bio;
        else if (profileData.description) profileBio.textContent = profileData.description;
        else profileBio.textContent = "Showcasing selected works.";
        if (!profileData.avatarUrl) {
          profileAvatar.src = `https://ui-avatars.com/api/?background=1f2f4e&color=fff&bold=true&size=100&name=${encodeURIComponent(profileName.textContent.substring(0,2))}`;
        }
      } else {
        profileName.textContent = "Creative Studio";
        profileBio.textContent = "Design & development projects.";
        profileAvatar.src = "https://ui-avatars.com/api/?background=2c3e66&color=fff&size=100&name=CS";
      }
    } catch (err) {
      console.warn("Profile fetch error:", err);
      profileName.textContent = "Portfolio";
      profileBio.textContent = "View projects below.";
      profileAvatar.src = "https://ui-avatars.com/api/?background=1e293b&color=fff&size=100&name=PF";
    }
  }

  // Fetch cards (collection "cards")
  async function fetchCards() {
    try {
      const cardsRef = collection(db, "cards");
      const snapshot = await getDocs(cardsRef);
      const cards = [];
      snapshot.forEach(doc => {
        const data = doc.data();
        cards.push({
          id: doc.id,
          title: data.title || "Untitled",
          description: data.description || "Click to explore.",
          imageUrl: data.imageUrl || data.image || "https://placehold.co/600x400/eef2ff/2c3e66?text=Project",
          linkUrl: data.linkUrl || data.url || data.fileUrl || "#",
        });
      });
      if (cards.length === 0) {
        cardsGrid.innerHTML = `<div class="empty-state">✨ No cards yet. Add projects via your admin panel — they will appear here.</div>`;
        cardCountBadge.textContent = "0 cards";
        return;
      }
      cardCountBadge.textContent = `${cards.length} card${cards.length !== 1 ? 's' : ''}`;
      renderCards(cards);
    } catch (err) {
      console.error("Cards error:", err);
      cardsGrid.innerHTML = `<div class="empty-state">⚠️ Could not load cards. Check Firestore rules and collection "cards".</div>`;
      cardCountBadge.textContent = "error";
    }
  }

  function renderCards(cards) {
    cardsGrid.innerHTML = "";
    cards.forEach(card => {
      const cardDiv = document.createElement('div');
      cardDiv.className = 'card-item';
      const img = document.createElement('img');
      img.className = 'card-img';
      img.src = card.imageUrl;
      img.alt = card.title;
      img.onerror = () => { img.src = "https://placehold.co/600x400/d9e2f0/2c3e66?text=Image+missing"; };
      const content = document.createElement('div');
      content.className = 'card-content';
      const title = document.createElement('h3');
      title.className = 'card-title';
      title.textContent = card.title;
      const desc = document.createElement('p');
      desc.className = 'card-description';
      desc.textContent = card.description;
      const btn = document.createElement('button');
      btn.className = 'card-open-btn';
      btn.innerHTML = '🔗 Open';
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (card.linkUrl && card.linkUrl !== '#') {
          window.open(card.linkUrl, '_blank', 'noopener,noreferrer');
        } else {
          alert('No external link attached.');
        }
      });
      content.append(title, desc, btn);
      cardDiv.append(img, content);
      cardDiv.addEventListener('click', (e) => {
        if (btn.contains(e.target)) return;
        openModal(card);
      });
      cardsGrid.appendChild(cardDiv);
    });
  }

  init();
  async function init() {
    await fetchProfile();
    await fetchCards();
  }
</script>
</body>
</html>
